name: Publish workflow-executor Docker image

on:
  push:
    tags:
      - '@forestadmin/workflow-executor@*'
  pull_request:
    # Validate on any change to the executor or to a dependency package's
    # manifest — a dep bump in one of the 5 source packages can drift the
    # image's dedicated lockfile (see packages/workflow-executor/docker/).
    paths:
      - 'packages/workflow-executor/**'
      - 'packages/agent-client/package.json'
      - 'packages/ai-proxy/package.json'
      - 'packages/forestadmin-client/package.json'
      - 'packages/datasource-toolkit/package.json'
      - 'packages/agent-toolkit/package.json'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. 1.7.0)'
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # On PRs: build the image (no push) to catch Dockerfile breakage before release.
  validate:
    name: Validate Dockerfile build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/workflow-executor/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: workflow-executor:pr
          cache-from: type=gha,scope=amd64
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: workflow-executor:pr
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  extract-version:
    name: Extract version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.version.outputs.full }}
      minor: ${{ steps.version.outputs.minor }}
      major: ${{ steps.version.outputs.major }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Parse version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#@forestadmin/workflow-executor@}"
          fi
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=${VERSION%.*}" >> $GITHUB_OUTPUT
          echo "major=${VERSION%%.*}" >> $GITHUB_OUTPUT
          # A SemVer prerelease (e.g. 1.8.0-beta.1) must not move the mutable tags.
          case "$VERSION" in
            *-*) echo "prerelease=true" >> $GITHUB_OUTPUT ;;
            *)   echo "prerelease=false" >> $GITHUB_OUTPUT ;;
          esac

  build:
    name: Build (${{ matrix.arch }})
    if: github.event_name != 'pull_request'
    needs: extract-version
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          # On manual dispatch, check out the requested version tag so the built
          # image matches the version it is published under (not the default branch).
          ref: ${{ github.event_name == 'workflow_dispatch' && format('@forestadmin/workflow-executor@{0}', github.event.inputs.version) || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/workflow-executor/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/forestadmin/workflow-executor,push-by-digest=true,name-canonical=true,push=true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/forestadmin/workflow-executor@${{ steps.build.outputs.digest }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-arch manifest
    if: github.event_name != 'pull_request'
    needs: [extract-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/forestadmin/workflow-executor
          FULL: ${{ needs.extract-version.outputs.full }}
          MINOR: ${{ needs.extract-version.outputs.minor }}
          MAJOR: ${{ needs.extract-version.outputs.major }}
          PRERELEASE: ${{ needs.extract-version.outputs.prerelease }}
        run: |
          # Always publish the immutable full-version tag. The mutable tags
          # (minor, major, latest) only move for stable releases, so a prerelease
          # like 1.8.0-beta.1 never overwrites the stable :latest / :1 images.
          TAGS="-t $IMAGE:$FULL"
          if [ "$PRERELEASE" != "true" ]; then
            TAGS="$TAGS -t $IMAGE:$MINOR -t $IMAGE:$MAJOR -t $IMAGE:latest"
          fi
          docker buildx imagetools create $TAGS \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect ghcr.io/forestadmin/workflow-executor:${{ needs.extract-version.outputs.full }}
