# Minimal single-instance setup for the workflow executor.
#
# 1. Copy .env.example to .env and fill in your secrets.
# 2. docker compose up
#
# Point your Forest Admin agent at: workflowExecutorUrl: "http://localhost:3400"

services:
  workflow-executor:
    image: ghcr.io/forestadmin/workflow-executor:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3400}:${HTTP_PORT:-3400}"
    environment:
      # Required
      FOREST_ENV_SECRET: ${FOREST_ENV_SECRET}
      FOREST_AUTH_SECRET: ${FOREST_AUTH_SECRET}
      AGENT_URL: ${AGENT_URL}
      DATABASE_URL: ${DATABASE_URL}
      # Optional
      HTTP_PORT: ${HTTP_PORT:-3400}
      FOREST_SERVER_URL: ${FOREST_SERVER_URL:-https://api.forestadmin.com}
      POLLING_INTERVAL_S: ${POLLING_INTERVAL_S:-30}
      LOG_LEVEL: ${LOG_LEVEL:-Info}
      DATABASE_SSL: ${DATABASE_SSL:-true}
    healthcheck:
      test: ["CMD", "node", "-e", "
        const http = require('http');
        const port = process.env.HTTP_PORT || 3400;
        http.get('http://localhost:' + port + '/health', (r) => {
          process.exit(r.statusCode === 200 ? 0 : 1);
        }).on('error', () => process.exit(1));
      "]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
